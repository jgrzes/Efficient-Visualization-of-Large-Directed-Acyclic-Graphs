syntax = "proto3";

message Edge {
    uint32 u = 1;
    uint32 v = 2;
}

message EdgeList {
    repeated Edge edges = 1;
}

message ColourHierarchyNode {
    uint32 colour = 1;
    repeated ColourHierarchyNode childrenNodes = 2;
}

message PreQAPData {
    string graphHash = 1;
    ColourHierarchyNode colourHierarchyRoot = 2;   
    uint32 rowsF = 3;
    uint32 colsF = 4;
    repeated uint64 linearizedF = 5;
}

message ColourOrderPair {
    uint32 colour = 1;
    uint32 order = 2;
}

message PostQAPData {
    string graphHash = 1;
    repeated ColourOrderPair colourOrdering = 2;
}

message CartesianCoords {
    float x = 1;
    float y = 2;
}

message GraphLayout {
    repeated CartesianCoords vertexCoords = 1;
}

service GraphLayoutService {
    rpc performPreQAPComputations(EdgeList) returns (PreQAPData) {};
    rpc performPostQAPComputations(PostQAPData) returns (GraphLayout) {};

}